name: Update Agent CLI cask

on:
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [agent-cli-release]

permissions:
  contents: write

concurrency:
  group: update-agent-cli-cask
  cancel-in-progress: false

jobs:
  update:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update cask from release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 .github/scripts/update_agent_cli_cask.py

      - name: Validate cask
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          brew tap basnijholt/tap
          tap_dir="$(brew --repo basnijholt/tap)"
          cp Casks/agent-cli.rb "$tap_dir/Casks/agent-cli.rb"
          brew style --cask basnijholt/tap/agent-cli
          brew audit --cask --online basnijholt/tap/agent-cli
          brew install --cask --dry-run basnijholt/tap/agent-cli

      - name: Commit and push update
        run: |
          if git diff --quiet -- Casks/agent-cli.rb; then
            echo "No cask update needed."
            exit 0
          fi

          version="$(ruby -ne 'puts $1 if /^  version "([^"]+)"/ =~ $_' Casks/agent-cli.rb)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/agent-cli.rb
          git commit -m "Update Agent CLI cask to v${version}"
          git push
